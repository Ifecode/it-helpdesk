{% extends 'base.html' %}
{% block title %}Login – IT Helpdesk{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-md">
    <div class="text-center mb-8">
      <div class="text-4xl mb-2">🖥️</div>
      <h1 class="text-2xl font-bold text-gray-800">IT Helpdesk</h1>
      <p class="text-gray-500 text-sm mt-1">Staff Portal — Sign in to continue</p>
    </div>
    {% for message in messages %}
    <div class="mb-4 bg-red-50 text-red-600 text-sm px-4 py-2 rounded-lg">{{ message }}</div>
    {% endfor %}
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input name="username" type="text" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input name="password" type="password" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition">Sign In</button>
    </form>
  </div>
</div>
{% endblock %}
